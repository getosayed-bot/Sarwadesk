name: Update Stock Prices

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'  # Every 5 min, 1pm-8pm UTC (covers 9:30am-4pm EST)
  workflow_dispatch:               # Also allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch prices and update
        env:
          TIINGO_KEY: ${{ secrets.TIINGO_KEY }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
        run: |
          node .github/scripts/update-prices.js

      - name: Commit updated prices
        run: |
          git config user.name "SarwaDesk Bot"
          git config user.email "bot@sarwadesk"
          git add prices.json
          git diff --staged --quiet || git commit -m "Auto-update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
